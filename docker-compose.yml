services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: applymanager-app
    shm_size: "1gb"
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-applymanager}
      DB_PASSWORD: ${DB_PASSWORD:-applymanager}
      DB_NAME: ${DB_NAME:-applymanager}
    depends_on:
      db:
        condition: service_healthy

  db:
    build:
      context: .
      dockerfile: db/Dockerfile
    container_name: applymanager-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-${DB_USER:-applymanager}}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-${DB_PASSWORD:-applymanager}}
      POSTGRES_DB: ${POSTGRES_DB:-${DB_NAME:-applymanager}}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
