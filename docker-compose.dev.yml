services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api-dev
    container_name: applymanager-api-dev
    shm_size: "1gb"
    working_dir: /app
    command: ["python3", "-m", "uvicorn", "server.main:app", "--host", "0.0.0.0", "--port", "3000", "--reload"]
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-applymanager}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_NAME: ${DB_NAME:-applymanager}
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy

  web:
    image: node:20-bookworm-slim
    container_name: applymanager-web-dev
    working_dir: /app
    command: ["sh", "-lc", "npm install && npm run dev -- --host 0.0.0.0 --port 1420"]
    ports:
      - "1420:1420"
    environment:
      VITE_API_PROXY_TARGET: http://api:3000
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      - api

  db:
    build:
      context: .
      dockerfile: db/Dockerfile
    container_name: applymanager-db-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-${DB_USER:-applymanager}}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-${DB_PASSWORD:?Set DB_PASSWORD in .env}}
      POSTGRES_DB: ${POSTGRES_DB:-${DB_NAME:-applymanager}}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
